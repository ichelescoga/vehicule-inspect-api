name: Deploy Vehicle Inspect API
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Login to ECR
        run: aws ecr get-login-password --region us-east-2 | docker login --username AWS --password-stdin 178659808868.dkr.ecr.us-east-2.amazonaws.com

      - name: Build Docker image
        run: docker build --platform linux/amd64 -t vehicule-inspect-api .

      - name: Tag and Push to ECR
        run: |
          docker tag vehicule-inspect-api:latest 178659808868.dkr.ecr.us-east-2.amazonaws.com/korea/vehicule-inspect-api:latest
          docker push 178659808868.dkr.ecr.us-east-2.amazonaws.com/korea/vehicule-inspect-api:latest

      - name: Deploy to ECS
        run: aws ecs update-service --cluster korea --service sv-vehicle-inspect --force-new-deployment --region us-east-2
